openapi: 3.0.2

info:
  title: Nationaal Watersportdiploma API
  description: |-
    Nationaal Watersportdiploma API
  version: 0.1.0

paths:
  /me:
    get:
      operationId: me
      summary: Retrieves information about the current user (if any)
      security:
        - open-id: []
        - api-key: []
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserModel'

  /discipline:
    get:
      operationId: listDisciplines
      tags:
        - discipline
      summary: Lists all disciplines
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DisciplineListModel'

  /discipline/{discipline-key}:
    parameters:
      - in: path
        name: discipline-key
        required: true
        schema:
          $ref: '#/components/schemas/HandleOrId'
    get:
      operationId: retrieveDiscipline
      tags:
        - discipline
      summary: Retrieves a single discipline
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DisciplineModel'
        '404':
          description: Not Found

  /discipline/{discipline-key}/curriculum:
    parameters:
      - in: path
        name: discipline-key
        required: true
        schema:
          $ref: '#/components/schemas/HandleOrId'
    get:
      operationId: retrieveCurriculaByDiscipline
      tags:
        - curriculum
      summary: Retrieves a curricula by discipline
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CurriculumListModel'
        '404':
          description: Not Found

  /programs:
    get:
      operationId: listPrograms
      summary: Retrieve a list of programs
      description: >-
        Retrieve a list of programs. The list will be paginated and the provided
        query parameters allow filtering the returned programs.
      tags:
        - program
      security:
        - open-id: []
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProgramListModel'

  /location:
    get:
      operationId: get-locations
      summary: Get all locations
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LocationListModel'

    post:
      operationId: create-location
      summary: Creates a new location
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLocationModel'

      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    $ref: '#/components/schemas/Id'
        '403':
          description: Forbidden

  /location/{location-key}/certificate:
    parameters:
      - in: path
        required: true
        name: location-key
        schema:
          $ref: '#/components/schemas/HandleOrId'

    get:
      operationId: get-location-certificates
      summary: Get all certificates for location
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LocationCertificateListModel'
        '404':
          description: Not Found

    post:
      operationId: create-location-certificate
      summary: Creates a new certificate for a location
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLocationCertificateModel'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    $ref: '#/components/schemas/Id'
        '403':
          description: Forbidden
        '404':
          description: Not Found

  /location/{location-key}/cohort:
    parameters:
      - in: path
        required: true
        name: location-key
        schema:
          $ref: '#/components/schemas/HandleOrId'

    get:
      operationId: get-location-cohorts
      summary: Get all cohorts for location
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LocationCohortListModel'
        '404':
          description: Not Found

    post:
      operationId: create-location-cohort
      summary: Creates a new cohort for a location
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateLocationCohortModel'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                properties:
                  id:
                    $ref: '#/components/schemas/Id'
        '403':
          description: Forbidden

  /location/{location-key}/cohort/{cohort-key}/import-session:
    parameters:
      - in: path
        required: true
        name: location-key
        schema:
          $ref: '#/components/schemas/HandleOrId'
      - in: path
        required: true
        name: cohort-key
        schema:
          $ref: '#/components/schemas/HandleOrId'
      - $ref: '#/components/parameters/RequestId'

    get:
      operationId: list-location-cohort-import-sessions
      tags:
        - import-session
      summary: Lists import sessions for a cohort
      description: >-
        Lists durable vendor full-snapshot import sessions for a cohort. This
        endpoint reports workflow state and validation summaries only; it does
        not expose private person lookup or match candidate results. Session
        keys are unique within a location; the cohort key narrows list results
        to one cohort.
      security:
        - open-id: []
        - api-key: []
      x-required-scopes:
        - import-session:read
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ImportSessionListModel'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
        '501':
          description: Not Implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'

  /location/{location-key}/cohort/{cohort-key}/import-session/{external-session-key}:
    parameters:
      - in: path
        required: true
        name: location-key
        schema:
          $ref: '#/components/schemas/HandleOrId'
      - in: path
        required: true
        name: cohort-key
        schema:
          $ref: '#/components/schemas/HandleOrId'
      - in: path
        required: true
        name: external-session-key
        schema:
          $ref: '#/components/schemas/ExternalSessionKey'
      - $ref: '#/components/parameters/RequestId'

    put:
      operationId: upsert-location-cohort-import-session
      tags:
        - import-session
      summary: Creates or replaces a vendor import session snapshot
      description: >-
        Creates or replaces the durable full snapshot received from a vendor for
        a cohort. The import session preserves source rows for later preview and
        commit workflows. It must not directly create persons, actors, or cohort
        allocations. Reusing the same key while the latest generation is
        received or reviewing is an idempotent full replacement of that
        snapshot. Reusing the same key after the latest generation is committed
        or cancelled creates a new generation for the same external key. A newer
        session key for the same cohort supersedes older open sessions.
      security:
        - open-id: []
        - api-key: []
      x-required-scopes:
        - import-session:write
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpsertImportSessionModel'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportSessionModel'
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportSessionModel'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
        '422':
          description: Validation Failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportSessionValidationErrorModel'
        '501':
          description: Not Implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'

  /location/{location-key}/import-session/{external-session-key}:
    parameters:
      - in: path
        required: true
        name: location-key
        schema:
          $ref: '#/components/schemas/HandleOrId'
      - in: path
        required: true
        name: external-session-key
        schema:
          $ref: '#/components/schemas/ExternalSessionKey'
      - $ref: '#/components/parameters/RequestId'

    get:
      operationId: retrieve-location-import-session
      tags:
        - import-session
      summary: Retrieves import session status
      description: >-
        Retrieves workflow state and validation summaries for a durable vendor
        full-snapshot import session. Private person lookup and match candidate
        results are intentionally not part of this contract. The external
        session key is resolved within the location scope.
      security:
        - open-id: []
        - api-key: []
      x-required-scopes:
        - import-session:read
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportSessionModel'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'
        '501':
          description: Not Implemented
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorModel'

components:
  parameters:
    IdempotencyKey:
      in: header
      name: Idempotency-Key
      required: false
      description: >-
        Optional client-generated key for retry de-duplication. For import
        sessions, the external session key remains the durable idempotency key.
      schema:
        type: string
        minLength: 1
        maxLength: 255

    RequestId:
      in: header
      name: X-Request-Id
      required: false
      description: Optional client request identifier echoed in errors and logs.
      schema:
        type: string
        minLength: 1
        maxLength: 255

  schemas:
    # Entities

    UserModel:
      type: object
      required:
        - id
        - handle
      properties:
        id:
          $ref: '#/components/schemas/Id'
        handle:
          $ref: '#/components/schemas/Handle'

    DisciplineModel:
      type: object
      required:
        - id
        - handle
      properties:
        id:
          $ref: '#/components/schemas/Id'
        handle:
          $ref: '#/components/schemas/Handle'

    DisciplineListModel:
      type: object
      required:
        - id
        - handle
      properties:
        id:
          $ref: '#/components/schemas/Id'
        handle:
          $ref: '#/components/schemas/Handle'

    CurriculumListModel:
      type: object
      required:
        - id
      properties:
        id:
          $ref: '#/components/schemas/Id'

    ProgramListModel:
      type: object
      required:
        - id
        - handle
        - title
        - degreeId
        - degreeTitle
        - disciplineId
        - disciplineTitle
      properties:
        id:
          $ref: '#/components/schemas/Id'
        handle:
          $ref: '#/components/schemas/Handle'
        title:
          $ref: '#/components/schemas/Title'
        degreeId:
          $ref: '#/components/schemas/Id'
        degreeTitle:
          $ref: '#/components/schemas/Title'
        disciplineId:
          $ref: '#/components/schemas/Id'
        disciplineTitle:
          $ref: '#/components/schemas/Title'

    LocationListModel:
      type: object
      required:
        - id
        - handle
        - title
      properties:
        id:
          $ref: '#/components/schemas/Id'
        handle:
          $ref: '#/components/schemas/Handle'
        title:
          $ref: '#/components/schemas/Title'

    CreateLocationModel:
      type: object
      required:
        - handle
        - title
      properties:
        handle:
          $ref: '#/components/schemas/Handle'
        title:
          $ref: '#/components/schemas/Title'

    LocationCohortListModel:
      type: object
      required:
        - id
        - handle
        - title
      properties:
        id:
          $ref: '#/components/schemas/Id'
        handle:
          $ref: '#/components/schemas/Handle'
        title:
          $ref: '#/components/schemas/Title'

    CreateLocationCohortModel:
      type: object
      required:
        - handle
        - title
      properties:
        handle:
          $ref: '#/components/schemas/Handle'
        title:
          $ref: '#/components/schemas/Title'

    LocationCertificateListModel:
      type: object
      required:
        - id
        - handle
        - title
      properties:
        id:
          $ref: '#/components/schemas/Id'
        handle:
          $ref: '#/components/schemas/Handle'
        title:
          $ref: '#/components/schemas/Title'

    CreateLocationCertificateModel:
      type: object
      required:
        - handle
        - title
      properties:
        handle:
          $ref: '#/components/schemas/Handle'
        title:
          $ref: '#/components/schemas/Title'

    ImportSessionListModel:
      type: object
      required:
        - externalSessionKey
        - locationKey
        - cohortKey
        - status
        - rowCount
        - validationSummary
        - receivedAt
        - updatedAt
      properties:
        externalSessionKey:
          $ref: '#/components/schemas/ExternalSessionKey'
        locationKey:
          $ref: '#/components/schemas/HandleOrId'
        cohortKey:
          $ref: '#/components/schemas/HandleOrId'
        status:
          $ref: '#/components/schemas/ImportSessionStatus'
        rowCount:
          type: integer
          minimum: 0
        validationSummary:
          $ref: '#/components/schemas/ImportSessionValidationSummaryModel'
        receivedAt:
          $ref: '#/components/schemas/DateTime'
        updatedAt:
          $ref: '#/components/schemas/DateTime'

    ImportSessionModel:
      allOf:
        - $ref: '#/components/schemas/ImportSessionListModel'
        - type: object
          required:
            - source
            - rows
          properties:
            source:
              $ref: '#/components/schemas/ImportSessionSourceModel'
            rows:
              type: array
              items:
                $ref: '#/components/schemas/ImportSessionRowModel'

    ImportSessionSourceModel:
      type: object
      required:
        - vendor
      properties:
        vendor:
          type: string
          minLength: 1
          example: buchung
        exportedAt:
          $ref: '#/components/schemas/DateTime'
        metadata:
          $ref: '#/components/schemas/RawMetadata'

    UpsertImportSessionModel:
      type: object
      required:
        - source
        - rows
      properties:
        source:
          $ref: '#/components/schemas/ImportSessionSourceModel'
        rows:
          type: array
          items:
            $ref: '#/components/schemas/UpsertImportSessionRowModel'

    UpsertImportSessionRowModel:
      type: object
      required:
        - externalRowKey
        - rowIndex
      properties:
        externalRowKey:
          $ref: '#/components/schemas/ExternalRowKey'
        rowIndex:
          type: integer
          minimum: 0
        firstName:
          type: string
          nullable: true
        lastNamePrefix:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        dateOfBirth:
          type: string
          format: date
          nullable: true
          description: Date of birth in YYYY-MM-DD format.
        birthCity:
          type: string
          nullable: true
        birthCountry:
          type: string
          nullable: true
          description: Preserved for audit and later workflows; not decisive in current matching.
        email:
          type: string
          format: email
          nullable: true
          description: Preserved for audit and later workflows; not decisive in current matching.
        tags:
          type: array
          items:
            type: string
        rawMetadata:
          $ref: '#/components/schemas/RawMetadata'

    ImportSessionRowModel:
      allOf:
        - $ref: '#/components/schemas/UpsertImportSessionRowModel'
        - type: object
          required:
            - validation
          properties:
            validation:
              $ref: '#/components/schemas/ImportSessionRowValidationModel'

    ImportSessionValidationSummaryModel:
      type: object
      required:
        - validRowCount
        - invalidRowCount
        - warningRowCount
      properties:
        validRowCount:
          type: integer
          minimum: 0
        invalidRowCount:
          type: integer
          minimum: 0
        warningRowCount:
          type: integer
          minimum: 0

    ImportSessionRowValidationModel:
      type: object
      required:
        - status
        - messages
      properties:
        status:
          type: string
          enum:
            - valid
            - warning
            - invalid
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ImportSessionRowValidationMessageModel'

    ImportSessionRowValidationMessageModel:
      type: object
      required:
        - code
        - message
        - severity
      properties:
        code:
          type: string
          minLength: 1
          description: Stable validation code. This string is intentionally open-ended.
        severity:
          type: string
          enum:
            - error
            - warning
            - info
        field:
          type: string
          nullable: true
        message:
          type: string
          minLength: 1

    ImportSessionValidationErrorModel:
      allOf:
        - $ref: '#/components/schemas/ErrorModel'
        - type: object
          required:
            - validationSummary
          properties:
            validationSummary:
              $ref: '#/components/schemas/ImportSessionValidationSummaryModel'
            rows:
              type: array
              description: Row-level validation details for rejected rows.
              items:
                $ref: '#/components/schemas/ImportSessionRowModel'

    ErrorModel:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          minLength: 1
        message:
          type: string
          minLength: 1
        requestId:
          type: string
          nullable: true
        details:
          $ref: '#/components/schemas/RawMetadata'

    # Fields

    Id:
      type: string
      format: uuid
      description: A unique identifier

    Title:
      type: string
      minLength: 1
      nullable: true
      description: A title (may be null)

    Handle:
      type: string
      pattern: ^[a-z0-9\-]+$
      minLength: 3
      description: The unique handle of an item
      not:
        $ref: '#/components/schemas/Id'

    HandleOrId:
      oneOf:
        - $ref: '#/components/schemas/Id'
        - $ref: '#/components/schemas/Handle'

    DateTime:
      type: string
      format: date-time

    ExternalSessionKey:
      type: string
      minLength: 1
      maxLength: 255
      description: Stable vendor identifier for a full-snapshot import session.

    ExternalRowKey:
      type: string
      minLength: 1
      maxLength: 255
      description: Stable vendor identifier for a row within an import session.

    ImportSessionStatus:
      type: string
      enum:
        - received
        - reviewing
        - committed
        - superseded
        - cancelled

    RawMetadata:
      type: object
      nullable: true
      additionalProperties: true

  securitySchemes:
    # this should be transformed into oauth authentication once the generator supports it
    # per-route workflow scopes are expressed as x-required-scopes until then
    open-id:
      type: http
      description: Default authentication mechanism
      scheme: bearer

    api-key:
      type: apiKey
      name: x-api-key
      in: header
