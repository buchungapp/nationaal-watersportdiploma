env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-lts:
    strategy:
      matrix:
        runs-on: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.runs-on }}
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TOKEN && vars.TURBO_TEAM || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm run initialize
      - run: pnpm install --frozen-lockfile
      - name: Build Project Artifacts
        run: >
          pnpm -w turbo run build
          --filter @nawadi/lib
          --filter @nawadi/db
          --filter @nawadi/core
          --filter @nawadi/api-server

  test:
    strategy:
      matrix:
        runs-on: [ubuntu-latest]
    runs-on: ${{ matrix.runs-on }}
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TOKEN && vars.TURBO_TEAM || '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: ./.github/actions/setup-node-pnpm
      - uses: supabase/setup-cli@v1
        with:
          version: 2.33.9
      - run: pnpm run initialize
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter supabase run start
      - run: >
          pnpm -w turbo run build
          --filter @nawadi/lib
          --filter @nawadi/db
          --filter @nawadi/core
          --filter @nawadi/scripts
      - run: pnpm db:reset
      - run: pnpm test
      - run: pnpm --filter supabase run stop

  audit:
    runs-on: ubuntu-latest
    # Known issues: mintlify has vulnerable transitive deps (express/path-to-regexp),
    # xlsx has no patched version available, node-forge needs upstream fix in @signpdf/signer-p12
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node-pnpm
      - run: pnpm audit --audit-level=high --ignore-registry-errors
        continue-on-error: true
